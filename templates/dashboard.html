<!DOCTYPE html>
<html>
<head>
  <title>Case Details</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="container">
  <h2>📂 Case & Doctor Details</h2>

  <input id="case_id" placeholder="Case ID">
  <input id="case_name" placeholder="Case Name">
  <input id="investigation_id" placeholder="Investigation ID">

  <h3>👨‍⚕️ Doctor Details</h3>
  <input id="doctor_id" placeholder="Doctor ID">
  <input id="doctor_name" placeholder="Doctor Name">
  <input id="doctor_org" placeholder="Working At">

  <h3>📝 Investigation Summary</h3>
  <textarea id="summary" placeholder="Write investigation summary..."></textarea>

  <button onclick="goToReview()">Continue</button>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
